<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0608"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <!-- Code window frame -->
  <rect x="80" y="60" width="420" height="300" rx="8" fill="#131313" stroke="rgba(139,26,42,0.4)" stroke-width="1"/>
  <rect x="80" y="60" width="420" height="32" rx="8" fill="#1e1e1e"/>
  <circle cx="106" cy="76" r="6" fill="#c0392b" opacity="0.8"/>
  <circle cx="128" cy="76" r="6" fill="#e8a838" opacity="0.6"/>
  <circle cx="150" cy="76" r="6" fill="#3a8b3a" opacity="0.6"/>
  <!-- Code lines -->
  <g font-family="monospace" font-size="13" fill-opacity="0.7">
    <text x="100" y="118" fill="#c0392b">&lt;html&gt;</text>
    <text x="120" y="140" fill="#7ec8e3">&lt;head&gt;</text>
    <text x="140" y="162" fill="#f0ece4">&lt;title&gt;</text><text x="205" y="162" fill="#a8d8a8">Zac Lab</text><text x="265" y="162" fill="#f0ece4">&lt;/title&gt;</text>
    <text x="120" y="184" fill="#7ec8e3">&lt;/head&gt;</text>
    <text x="120" y="206" fill="#7ec8e3">&lt;body&gt;</text>
    <text x="140" y="228" fill="#c0392b">  const</text><text x="195" y="228" fill="#f0ece4"> build </text><text x="242" y="228" fill="#c0392b">=</text><text x="256" y="228" fill="#a8d8a8"> () =&gt; &#123;</text>
    <text x="160" y="250" fill="#b8b0a6">  // ship fast</text>
    <text x="140" y="272" fill="#a8d8a8">  &#125;</text>
    <text x="120" y="294" fill="#7ec8e3">&lt;/body&gt;</text>
    <text x="100" y="316" fill="#c0392b">&lt;/html&gt;</text>
  </g>
  <!-- Floating elements right -->
  <rect x="560" y="100" width="160" height="80" rx="6" fill="#1a0608" stroke="rgba(192,57,43,0.3)" stroke-width="1"/>
  <text x="580" y="145" font-family="monospace" font-size="11" fill="rgba(192,57,43,0.9)">⚡ DEPLOYED</text>
  <rect x="560" y="200" width="160" height="60" rx="6" fill="#0a1a0a" stroke="rgba(60,140,60,0.3)" stroke-width="1"/>
  <text x="580" y="228" font-family="monospace" font-size="10" fill="rgba(100,200,100,0.8)">✓ Build passed</text>
  <text x="580" y="248" font-family="monospace" font-size="10" fill="rgba(100,200,100,0.6)">✓ Tests: 48/48</text>
  <rect x="560" y="280" width="160" height="60" rx="6" fill="#0a0a1a" stroke="rgba(80,80,200,0.3)" stroke-width="1"/>
  <text x="580" y="308" font-family="monospace" font-size="10" fill="rgba(140,140,220,0.8)">↑ 99.9% uptime</text>
  <text x="580" y="328" font-family="monospace" font-size="10" fill="rgba(140,140,220,0.6)">0ms errors</text>
  <!-- Label -->
  <text x="400" y="390" text-anchor="middle" font-family="Cinzel,serif" font-size="11" fill="rgba(192,57,43,0.6)" letter-spacing="4">WEB DEPLOYMENT</text>
