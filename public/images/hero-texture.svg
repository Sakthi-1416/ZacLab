      <stop offset="0%" stop-color="#8b1a2a" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#3a0810" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
