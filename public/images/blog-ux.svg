  <rect x="560" y="80" width="160" height="24" rx="4" fill="#6b0f1a"/>
  <rect x="560" y="112" width="160" height="24" rx="4" fill="#131313"/>
  <rect x="560" y="144" width="160" height="24" rx="4" fill="#f0ece4"/>
  <rect x="560" y="176" width="160" height="24" rx="4" fill="#b8b0a6"/>
  <text x="560" y="224" font-family="monospace" font-size="10" fill="rgba(192,57,43,0.6)">COLOUR SYSTEM</text>

  <!-- Spacing tokens -->
  <rect x="560" y="250" width="160" height="100" rx="4" fill="#131313" stroke="rgba(139,26,42,0.2)" stroke-width="1"/>
  <text x="572" y="272" font-family="monospace" font-size="10" fill="rgba(180,180,180,0.6)">--space-xs: 4px</text>
  <text x="572" y="290" font-family="monospace" font-size="10" fill="rgba(180,180,180,0.6)">--space-sm: 8px</text>
  <text x="572" y="308" font-family="monospace" font-size="10" fill="rgba(180,180,180,0.6)">--space-md: 16px</text>
  <text x="572" y="326" font-family="monospace" font-size="10" fill="rgba(180,180,180,0.6)">--space-lg: 32px</text>
  <text x="572" y="344" font-family="monospace" font-size="10" fill="rgba(180,180,180,0.6)">--space-xl: 64px</text>

  <text x="400" y="390" text-anchor="middle" font-family="Cinzel,serif" font-size="11" fill="rgba(192,57,43,0.6)" letter-spacing="4">UI/UX DESIGN</text>
