<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2e1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg3)"/>
  <!-- Phone wireframe -->
  <rect x="110" y="50" width="180" height="320" rx="18" fill="#131313" stroke="rgba(139,26,42,0.5)" stroke-width="1.5"/>
  <rect x="125" y="70" width="150" height="280" rx="6" fill="#0e0e0e"/>
  <!-- Phone UI -->
  <rect x="135" y="82" width="130" height="40" rx="4" fill="#1a0608" opacity="0.8"/>
  <rect x="135" y="130" width="60" height="60" rx="4" fill="#1e1e1e"/>
  <rect x="205" y="130" width="60" height="60" rx="4" fill="#1e1e1e"/>
  <rect x="135" y="200" width="130" height="30" rx="4" fill="#1e1e1e"/>
  <rect x="135" y="240" width="130" height="30" rx="4" fill="#1e1e1e"/>
  <rect x="135" y="290" width="80" height="28" rx="14" fill="rgba(192,57,43,0.6)"/>
  <!-- Figma-style overlay annotations -->
  <line x1="295" y1="100" x2="370" y2="90" stroke="rgba(192,57,43,0.4)" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="370" y="76" width="110" height="28" rx="4" fill="rgba(192,57,43,0.12)" stroke="rgba(192,57,43,0.3)" stroke-width="1"/>
  <text x="378" y="95" font-family="monospace" font-size="11" fill="rgba(192,57,43,0.8)">Nav · 40px</text>

  <line x1="295" y1="160" x2="370" y2="155" stroke="rgba(80,160,220,0.4)" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="370" y="142" width="130" height="28" rx="4" fill="rgba(80,160,220,0.08)" stroke="rgba(80,160,220,0.3)" stroke-width="1"/>
  <text x="378" y="161" font-family="monospace" font-size="11" fill="rgba(80,160,220,0.8)">Card · 60x60</text>

  <line x1="295" y1="304" x2="370" y2="298" stroke="rgba(160,220,80,0.4)" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="370" y="285" width="140" height="28" rx="4" fill="rgba(80,180,80,0.08)" stroke="rgba(80,180,80,0.3)" stroke-width="1"/>
  <text x="378" y="304" font-family="monospace" font-size="11" fill="rgba(80,200,80,0.8)">CTA Button</text>

